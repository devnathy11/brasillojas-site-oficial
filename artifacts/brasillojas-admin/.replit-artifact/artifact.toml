kind = "web"
previewPath = "/admin/"
title = "BrasilLojas Admin"
version = "1.0.0"
id = "artifacts/brasillojas-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 24651

[services.development]
run = "pnpm --filter @workspace/brasillojas-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brasillojas-admin", "run", "build" ]
publicDir = "artifacts/brasillojas-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24651"
BASE_PATH = "/admin/"
